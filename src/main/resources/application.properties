# -------------------------------
# DATABASE CONFIG (SPRING BOOT)
# -------------------------------
# MySQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/quantitydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Wasim123}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

# -------------------------------
# GOOGLE OAUTH2
# -------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}

#${GOOGLE_CLIENT_ID}
#this will give error go and check the id and password of google client annd do it manually 
#you can get it from systemenv too by System.systemenvread more*/
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}


#${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub